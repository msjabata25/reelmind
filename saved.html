<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReelMind — Saved Reels</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="saved_styles.css">
</head>
<body>

<div class="bg-mesh"></div>
<div class="grain"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="page">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a7 7 0 0 1 7 7c0 4-3 6-3 9H8c0-3-3-5-3-9a7 7 0 0 1 7-7z"/>
          <line x1="9" y1="21" x2="15" y2="21"/>
          <line x1="9.5" y1="18" x2="14.5" y2="18"/>
          <line x1="12" y1="6" x2="12" y2="11"/>
          <line x1="9.5" y1="8.5" x2="14.5" y2="8.5"/>
        </svg>
      </div>
      <div class="header-titles">
        <h1>Saved Reels</h1>
        <p>Everything you've categorized, in one place</p>
      </div>
    </div>
    <a href="index.html" class="back-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to ReelMind
    </a>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <span class="stats-count" id="reelCount">Loading...</span>
  </div>
<!---->
<!-- Search bar -->
<div class="search-bar" id="searchBar" style="display:none;">
  <div class="search-input-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" type="text" id="searchInput" placeholder="Search reels, categories, tags..." />
    <button class="search-clear" id="searchClear" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <span class="search-results-count" id="searchResultsCount"></span>
</div>


  <!-- Grid -->
  <div id="gridContainer">
    <!-- Loading skeletons -->
    <div class="loading-grid" id="loadingState">
      ${[1,2,3].map(() => `
      <div class="skeleton-card">
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-block"></div>
        <div class="skeleton skeleton-tags"></div>
        <div class="skeleton skeleton-btn"></div>
      </div>`).join('')}
    </div>
  </div>

</div>

<script  type="module" src="saved.js" >

</script>

</body>
</html>
